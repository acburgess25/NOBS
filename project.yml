name: NOBS
options:
  bundleIdPrefix: com.nobsdash
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  NOBSKit:
    path: .

targets:
  NOBS:
    type: application
    platform: iOS
    sources:
      - path: Sources/NOBSApp
    resources:
      - path: Resources/Assets.xcassets
    dependencies:
      - package: NOBSKit
        product: NOBSKit
      - target: NOBSWidget
    entitlements:
      path: Resources/NOBS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nobsdash.app
        INFOPLIST_FILE: Resources/Info.plist
        DEVELOPMENT_TEAM: K853LKQLAS
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: "4"
        MARKETING_VERSION: "2.0.0"
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Release:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: K853LKQLAS

  NOBSWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: NOBSWidget
    dependencies:
      - package: NOBSKit
        product: NOBSKit
    entitlements:
      path: NOBSWidget/NOBSWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nobsdash.app.widget
        INFOPLIST_FILE: NOBSWidget/Info.plist
        DEVELOPMENT_TEAM: K853LKQLAS
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: "4"
        MARKETING_VERSION: "2.0.0"
      configs:
        Release:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: K853LKQLAS
