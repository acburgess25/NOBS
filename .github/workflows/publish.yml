name: Production Release

on:
  schedule:
    - cron: '0 5 * * 1'  # Weekly build every Monday at 12:00 AM EST (for production/App Store review)
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Install xcodegen
        run: brew install xcodegen 2>/dev/null || true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run fastlane release
        run: bundle exec fastlane release
        env:
          DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
