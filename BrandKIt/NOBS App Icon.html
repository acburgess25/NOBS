<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NOBS — App Icon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500&family=Permanent+Marker&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #2a2622; }
    body { font-family: "JetBrains Mono", ui-monospace, monospace; color: #e9e2d7; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="app-icon.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas
          title="NOBS · App Icon"
          subtitle="Refining 09 · amber square with raw stamped N"
        >
          <DCSection id="hero" title="Hero & scale">
            <DCArtboard id="a1" label="A1 · Hero" width={600} height={420}>
              <A1_Hero />
            </DCArtboard>
            <DCArtboard id="a9" label="A9 · Splash" width={600} height={420}>
              <A9_Splash />
            </DCArtboard>
            <DCArtboard id="a2" label="A2 · Scale stack" width={780} height={420}>
              <A2_Scales />
            </DCArtboard>
            <DCArtboard id="a7" label="A7 · Raw vs clean" width={780} height={420}>
              <A7_Clean />
            </DCArtboard>
          </DCSection>

          <DCSection id="variants" title="Color & mark">
            <DCArtboard id="a3" label="A3 · Color" width={820} height={420}>
              <A3_Colors />
            </DCArtboard>
            <DCArtboard id="a4" label="A4 · Mark variants" width={820} height={420}>
              <A4_Marks />
            </DCArtboard>
          </DCSection>

          <DCSection id="lockup" title="Lockups">
            <DCArtboard id="a5" label="A5 · Horizontal lockup" width={600} height={360}>
              <A5_Lockup />
            </DCArtboard>
            <DCArtboard id="a6" label="A6 · Stacked lockup" width={600} height={360}>
              <A6_StackedLockup />
            </DCArtboard>
          </DCSection>

          <DCSection id="insitu" title="In situ">
            <DCArtboard id="a8" label="A8 · Home screen" width={520} height={620}>
              <A8_HomeScreen />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
