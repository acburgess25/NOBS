<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOBS Heartbeat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      color-scheme: light dark;
      --bg: #f7f4ef;
      --ink: #101418;
      --muted: #65706b;
      --panel: rgba(255,255,255,0.76);
      --line: rgba(16,20,24,0.1);
      --good: #35a66f;
      --bad: #c75d5d;
      --warn: #d97706;
      font-family: ui-rounded, "SF Pro Rounded", system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111412;
        --ink: #f5f2ec;
        --muted: #a7ada8;
        --panel: rgba(28,31,29,0.78);
        --line: rgba(245,242,236,0.12);
      }
    }
    body {
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 22% 12%, rgba(53,166,111,0.16), transparent 28rem),
        radial-gradient(circle at 82% 24%, rgba(217,119,6,0.13), transparent 28rem),
        var(--bg);
      padding: 28px;
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: min(840px, 100%);
      margin: 0 auto;
      padding: clamp(34px, 7vw, 76px) 0;
    }
    a { color: inherit; font-weight: 800; text-decoration: none; }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 64px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
    }
    .mark {
      position: relative;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #f4f7f9;
      background: #090e14;
      font-size: 24px;
      font-weight: 900;
    }
    .mark::after {
      content: "";
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--good);
    }
    .hero {
      display: grid;
      gap: 24px;
      margin-bottom: 28px;
    }
    .pulse {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 850;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--warn);
      box-shadow: 0 0 0 0 rgba(217,119,6,0.28);
      animation: beat 1.7s infinite;
    }
    .ok .dot { background: var(--good); box-shadow: 0 0 0 0 rgba(53,166,111,0.3); }
    .bad .dot { background: var(--bad); box-shadow: 0 0 0 0 rgba(199,93,93,0.28); }
    @keyframes beat {
      0% { transform: scale(0.9); box-shadow: 0 0 0 0 currentColor; }
      55% { transform: scale(1); box-shadow: 0 0 0 12px transparent; }
      100% { transform: scale(0.9); box-shadow: 0 0 0 0 transparent; }
    }
    h1 {
      font-size: clamp(3rem, 8vw, 5.8rem);
      line-height: 0.96;
      letter-spacing: 0;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: clamp(20px, 4vw, 30px);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 24px 70px rgba(16,20,24,0.12);
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .tile {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      min-height: 86px;
    }
    .label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 850;
      margin-bottom: 6px;
    }
    .value {
      font-size: 1.05rem;
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .checks {
      display: grid;
      gap: 10px;
    }
    .check {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
    }
    .check span:last-child { color: var(--muted); text-align: right; }
    .small {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
      margin-top: 16px;
    }
    @media (max-width: 640px) {
      body { padding: 20px; }
      .summary { grid-template-columns: 1fr; }
      .top { margin-bottom: 44px; }
    }
  </style>
</head>
<body>
  <main>
    <nav class="top">
      <a class="brand" href="/"><span class="mark">N</span><span>NOBS</span></a>
      <a href="/beta/">Private beta</a>
    </nav>

    <section class="hero" id="state">
      <div class="pulse"><span class="dot"></span><span id="stateText">Checking heartbeat...</span></div>
      <h1>NOBS heartbeat</h1>
    </section>

    <section class="card">
      <div class="summary">
        <div class="tile">
          <div class="label">Status</div>
          <div class="value" id="statusValue">Checking</div>
        </div>
        <div class="tile">
          <div class="label">Checked</div>
          <div class="value" id="checkedValue">--</div>
        </div>
        <div class="tile">
          <div class="label">Source</div>
          <div class="value">nobsdash.com</div>
        </div>
      </div>
      <div class="checks" id="checks"></div>
      <p class="small">This page checks the live NOBS API heartbeat every 30 seconds. It is intentionally public and only reports service health, not private user data.</p>
    </section>
  </main>

  <script>
    const state = document.getElementById("state");
    const stateText = document.getElementById("stateText");
    const statusValue = document.getElementById("statusValue");
    const checkedValue = document.getElementById("checkedValue");
    const checks = document.getElementById("checks");

    function setState(kind, text) {
      state.classList.remove("ok", "bad");
      if (kind) state.classList.add(kind);
      stateText.textContent = text;
    }

    function render(data) {
      const ok = Boolean(data.ok);
      setState(ok ? "ok" : "bad", ok ? "NOBS is alive" : "NOBS needs attention");
      statusValue.textContent = ok ? "Alive" : "Attention";
      checkedValue.textContent = data.checkedAt ? new Date(data.checkedAt).toLocaleTimeString() : "--";
      checks.innerHTML = "";
      for (const item of data.checks || []) {
        const row = document.createElement("div");
        row.className = "check";
        row.innerHTML = `<strong>${item.ok ? "OK" : "Check"} · ${item.name}</strong><span>${item.detail || ""}</span>`;
        checks.appendChild(row);
      }
    }

    async function load() {
      try {
        const response = await fetch("/api/v1/heartbeat", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        render(await response.json());
      } catch (error) {
        setState("bad", "Heartbeat unreachable");
        statusValue.textContent = "Offline";
        checkedValue.textContent = new Date().toLocaleTimeString();
        checks.innerHTML = `<div class="check"><strong>Check · api</strong><span>${error.message}</span></div>`;
      }
    }

    load();
    window.setInterval(load, 30000);
  </script>
</body>
</html>
