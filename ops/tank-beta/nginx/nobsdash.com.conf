server {
    listen 80;
    listen [::]:80;
    server_name nobsdash.com www.nobsdash.com;

    root /var/www/nobsdash;
    index index.html;

    access_log /var/log/nginx/nobsdash.access.log;
    error_log /var/log/nginx/nobsdash.error.log;

    location = /healthz {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"ok":true,"service":"nginx"}';
    }

    location = /ollama/v1/chat/completions {
        limit_except POST { deny all; }
        proxy_pass http://127.0.0.1:11434/v1/chat/completions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
    }

    location /api/v1/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location = /testflight {
        proxy_pass http://127.0.0.1:18080/api/v1/testflight;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /join {
        proxy_pass http://127.0.0.1:18080/api/v1/testflight;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}


