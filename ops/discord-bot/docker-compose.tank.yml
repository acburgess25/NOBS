services:
  discord-bot:
    build:
      context: .
      dockerfile: services/discord-bot/Dockerfile
    container_name: nobs-discord-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - OPENHANDS_URL=http://openhands:3000
      - OLLAMA_URL=http://host.docker.internal:11434
      - MEMORIES_URL=http://memories-api:8090
      - AUTOPILOT_DIR=/autopilot
    networks:
      - core
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/training/data/discord-bot-state:/state
      - /home/alex/logs/tank-autopilot:/autopilot
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; os.kill(1, 0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s


  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: nobs-litellm
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./services/llm-router/litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - core
    extra_hosts:
      - "host.docker.internal:host-gateway"

  llm-router:
    build:
      context: .
      dockerfile: services/llm-router/Dockerfile
    container_name: nobs-llm-router
    restart: unless-stopped
    env_file: .env
    environment:
      - LITELLM_URL=http://litellm:4000
      - DECISIONS_LOG=/state/decisions.jsonl
    volumes:
      - /mnt/training/data/llm-router:/state
    ports:
      - "4000:8000"
    networks:
      - core
    depends_on:
      - litellm


  scraper:
    build:
      context: .
      dockerfile: services/scraper/Dockerfile
    container_name: nobs-scraper
    restart: unless-stopped
    networks:
      - core
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - SCRAPER_MODEL=llama3.2:3b
    shm_size: "1gb"


  narrator:
    build:
      context: .
      dockerfile: services/narrator/Dockerfile
    container_name: nobs-narrator
    restart: unless-stopped
    networks:
      - core
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENHANDS_URL=http://openhands:3000
      - OLLAMA_URL=http://host.docker.internal:11434
      - NARRATOR_MODEL=llama3.2:3b
      - NARRATOR_INTERVAL_S=120
    volumes:
      - /mnt/training/data/discord-bot-state:/state




  memories-api:
    build:
      context: ./services/memories-api
      dockerfile: Dockerfile
    container_name: nobs-memories-api
    restart: unless-stopped
    env_file: .env
    environment:
      - JWT_SECRET_KEY=${NOBS_JWT_SECRET_KEY}
      - DATABASE_URL=sqlite:////data/memories.db
    networks:
      - core
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/training/data/memories-api:/data
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8090/healthz\", timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s



networks:
  core:
    external: true
    name: core_default
