# Nginx reverse proxy for nobsdash.com - Cloudflare Tunnel Optimized Configuration
# Deploy to /etc/nginx/sites-available/nobsdash.com

upstream voice_chat {
    server 127.0.0.1:8090;
}

upstream agent_dashboard {
    server 127.0.0.1:8787;
}

upstream phoenix_dashboard {
    server 127.0.0.1:6006;
}

upstream ollama_api {
    server 127.0.0.1:11434;
}

server {
    listen 80;
    listen [::]:80;
    server_name nobsdash.com www.nobsdash.com;

    # Increase buffer sizes for large responses
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;
    gzip_vary on;

    # Static Landing page at root
    location / {
        root /var/www/nobsdash;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Voice Chat Web App
    location /chat {
        proxy_pass http://voice_chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static {
        proxy_pass http://voice_chat;
        proxy_set_header Host $host;
    }

    location /api/chat {
        proxy_pass http://voice_chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/tts {
        proxy_pass http://voice_chat;
        proxy_set_header Host $host;
    }

    location /api/v1/ {
        proxy_pass http://voice_chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/login {
        proxy_pass http://voice_chat;
        proxy_set_header Host $host;
        proxy_set_header Content-Type application/x-www-form-urlencoded;
    }

    location /api/register {
        proxy_pass http://voice_chat;
        proxy_set_header Host $host;
        proxy_set_header Content-Type application/x-www-form-urlencoded;
    }

    location /api/mac {
        proxy_pass http://voice_chat;
        proxy_set_header Host $host;
    }

    # Self-Improving Agent Dashboard
    location /dashboard {
        proxy_pass http://agent_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/dashboard {
        proxy_pass http://agent_dashboard;
        proxy_set_header Host $host;
    }

    # Phoenix Observability Dashboard
    location /research {
        proxy_pass http://phoenix_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/observability {
        proxy_pass http://phoenix_dashboard;
        proxy_set_header Host $host;
    }

    # Ollama API
    location /ollama {
        proxy_pass http://ollama_api;
        proxy_set_header Host $host;
    }

    # NobsAgency - AI Advertising & Operations Agency
    location /agency {
        proxy_pass http://127.0.0.1:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /agency/ {
        proxy_pass http://127.0.0.1:8070/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for real-time updates
    location /ws {
        proxy_pass http://voice_chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
